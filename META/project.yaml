project:
  id: "skill-audit-ui"
  name: "Qualitative-Comparison Platform"
  description: "A two-ended platform for running qualitative/case studies fast over arbitrary resources. Generation end: apply tools/scales to a corpus → outputs. Evaluation end: convey how much any two outputs AGREE (salience-weighted, semantic not textwise) rather than ranking which is better. Book-distillation auditing is the first user; deep-research comparison is a second."
