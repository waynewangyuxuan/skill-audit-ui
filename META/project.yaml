project:
  id: "skill-audit-ui"
  name: "Qualitative-Comparison Platform"
  description: "A two-ended platform for running qualitative/case studies fast over arbitrary resources. Production end: apply tools/scales to a corpus → outputs. Evaluation end: side-by-side pairwise comparison of any two resources/outputs, with semantic (not textwise) alignment highlighting. Book-distillation auditing is the first user; deep-research comparison is a second."
