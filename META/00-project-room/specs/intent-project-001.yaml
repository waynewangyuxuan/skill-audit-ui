spec_id: intent-project-001
type: intent
state: active

intent:
  summary: "A two-ended qualitative-comparison research platform: a PRODUCTION end (apply tools/scales to a corpus → outputs) and an EVALUATION end (side-by-side pairwise comparison of any two resources/outputs, with SEMANTIC — not textwise — alignment highlighting). Resource-agnostic; the book-distillation case is just the first user."
  detail: |
    REALIGNED 2026-07-12 (teammate-alignment discussion). The first cut of this
    spec drifted: it scoped the project as a "single-book skill-audit tool" built
    around a provenance chain (book → skill → answer). That was too narrow on
    three counts — it locked input to one book, it only modelled the evaluation
    half, and it made provenance the headline instead of the comparison itself.
    This rewrite restores the real direction.

    WHAT WE ARE ACTUALLY BUILDING — a general tool to run qualitative / case
    studies FAST, over arbitrary resources. Two ends, and both ends together are
    the deliverable (and the potential HCI paper):

      PRODUCTION END (测试端).
        A UI to pick different tools / scales / styles and apply them to a corpus,
        producing outputs. Corpus is swappable; scales are swappable; you get a
        matrix of outputs quickly and conveniently. "scale × corpus → output."
        This is the generation side that feeds the evaluation end.

      EVALUATION END (评测端).
        Take ANY TWO resources or ANY TWO outputs and compare them side-by-side,
        in a way that lets a human do pairwise qualitative comparison efficiently
        and in batch. This is what solves the problem Frederick raised: comparing
        raw outputs textwise gives you no comparability — you cannot see which
        parts are similar and which differ.

    THE KILLER FEATURE — semantic, not textwise, alignment.
      Think of the online "plagiarism / AI-detection colour boards" that highlight
      when one passage is textually similar to another author's. We want the more
      advanced version: highlight where two pieces express a SIMILAR VIEWPOINT or
      claim, even when the wording is completely different. That semantic
      alignment is the thing that makes efficient pairwise qualitative study
      possible.

    GENERALITY IS THE POINT.
      The same platform must serve more than book distillation. Concrete second
      customer: Vert's team comparing different deep-research approaches — different
      resources answering different questions, produced by different methods, and
      you want a side-by-side to judge which method is better. If the eval end is
      resource-agnostic, it covers both.

    PROVENANCE IS DEMOTED.
      "Jump from an output fragment back to its source snippet" is still valuable,
      but it is now ONE feature of the evaluation end, not the project's identity.
      Where a shared source exists (e.g. book distillation) we can also show
      source-anchored / coverage views; where it does not (two deep-research
      outputs to different prompts) the comparison falls back to pure semantic
      pairwise alignment.

    PAPER ANGLE.
      Target an HCI-style venue (deadline ~mid-Sep, to be confirmed with
      Frederick). For that class of venue the bar is the STORY and the CODE /
      interaction quality, not experimental results — so the UI must look and feel
      good. Direction still to be confirmed with Frederick via a short doc + diagram.

    OPEN-SOURCE.
      There is hesitation about open-sourcing prematurely given the paper. Repo is
      currently public; revisit before/at paper submission.

  next_steps:
    - "Write the two-end concept doc + a diagram; send to Frederick to confirm direction."
    - "Stand up the evaluation-end UI first (fastest path to a demo-able artifact)."

constraints:
  - "Resource-agnostic: never hard-code 'a book'. Inputs are arbitrary resources/outputs; book distillation is the first case, not the only one."
  - "Deliverable = BOTH ends (production 测试端 + evaluation 评测端). A one-ended tool is not the thing we are pitching."
  - "The comparison must be SEMANTIC / viewpoint-level, not textwise string matching. That is the differentiator."
  - "Provenance (jump-to-source) is one evaluation-end feature, not the headline; it only applies when a shared source exists."
  - "HCI venue ⇒ story + interaction/code quality over experiment results; the UI must be polished."
  - "Frequent updates; each feature gets a 15-30s clip."

