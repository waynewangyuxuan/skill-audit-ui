spec_id: intent-comparison-workbench-001
type: intent
state: active

intent:
  summary: "The EVALUATION end (评测端): take any two (or a few) resources/outputs and compare them side-by-side, aligning on MEANING not position — semantic/viewpoint highlighting so a human can do pairwise qualitative study efficiently and in batch. Resource-agnostic."
  detail: |
    REALIGNED 2026-07-12. Was scoped as "compare, over ONE book, what THREE named
    distillation methods (book2skill / 女娲 / DSL) distilled" — locked to one shared
    source and three specific producers. The real thing is resource-agnostic
    pairwise comparison; the 3-methods-of-1-book case is just one instance.

    THE PROBLEM (Frederick's complaint). Put two outputs next to each other and read
    them raw and you have NO comparability — you can't see which parts say the same
    thing and which diverge. Textwise diff / string-similarity (the online plagiarism
    "colour boards") is not enough, because two pieces can express the SAME viewpoint
    in completely different words. We need semantic alignment.

    CORE UX — side-by-side + semantic alignment.
      Two (or up to ~3) panels, each output in its NATIVE structure. Do NOT force
      row-alignment (position ≠ meaning). Hover / select a chunk in panel A →
      highlight the semantically-nearest chunks in B (and C), red/yellow by strength.
      Alignment is embedding-cosine driven, content-based. This is what turns a slow
      manual read into a fast, batchable pairwise qualitative study.

    CLAIM-NORMALIZED GRID (the scalable view).
      Normalize each output into a set of atomic claims (embedding + clustering),
      then render a matrix: rows = union of claims, columns = the outputs being
      compared, cells = does / how each output expresses that claim. Surfaces
      agreement (full row), unique contribution (single column), and conflict (all
      express it but disagree). This is the real "compare the distillates directly,"
      via a claim layer rather than raw files, and it generalizes to N outputs.

    SOURCE-ANCHORED VIEW (conditional — only when a shared source exists).
      When the two outputs are derived from the SAME source (e.g. book distillation),
      also offer a source-anchored lens: highlight which source spans each output
      consumed, with a coverage heatmap (how many outputs touched each span:
      consensus vs idiosyncratic vs missed) and jump-to-source provenance. When the
      outputs have NO shared source (e.g. two deep-research answers to different
      prompts), this lens is simply unavailable and comparison falls back to the
      semantic pairwise + claim-grid views above.

    TWO CONCRETE CUSTOMERS this must serve with the same UI:
      - Book distillation: compare what different methods/scales distilled from a book.
      - Deep research (Vert's team): compare outputs of different deep-research
        approaches to judge which is better.

  next_steps:
    - "Inspect real sample outputs (book2skill + 女娲, and one deep-research pair) before finalizing the claim/embedding layer."
    - "Prototype the two-panel semantic-highlight interaction first — it is the demo-able core."

constraints:
  - "Resource-agnostic: two arbitrary outputs, not '3 named methods of 1 book'. The book case is one instance."
  - "Align on MEANING (semantic cosine / claims), never on position. Textwise string matching is explicitly not sufficient."
  - "Source-anchored / coverage / jump-to-source views are CONDITIONAL on a shared source; the tool must work without one."
  - "Semantic-highlight two-panel view is the MVP and the demo core; claim-grid is second; source-anchored lens is opt-in when applicable."
  - "Validate the claim-layer design against REAL sample outputs before building it."

