spec_id: intent-comparison-workbench-001
type: intent
state: active

intent:
  summary: "Compare, over one corpus, what multiple distillation methods distilled — by building one tripartite graph (source → product → claim) and rendering it as three lenses."
  detail: |
    Problem: the distillation products from the three methods are HETEROGENEOUS.
      - book2skill: atomic method cards + a playbook (orchestration), each card
        anchored back to source chapters (RAG firewall).
      - 女娲 (Nüwa): a more holistic methodology document (structure TBC — inspect
        a real sample before finalizing the claim layer).
      - DSL: a structured / domain-specific-language representation.
    Different structure, different length ⇒ they CANNOT be aligned by position
    (left/right same row ≠ same thing). To compare, you must pick a shared axis
    to hang the comparison on.

    Backbone data model — ONE tripartite graph. Build it once, render three lenses:

      source span ──consumed-by──▶ product fragment ──expresses──▶ claim
        (the book)          (method card / 女娲 段 / DSL node)   (normalized point)

    The three user-identified perspectives are just three pivots on this graph:

    LENS 1 — Source-anchored (pivot on source node). MVP.
      Left rail = whole book; spans cited by any method are highlighted. Click a
      span → right panels show, per method, the fragment(s) that consumed it.
      Key visual: a COVERAGE HEATMAP — for each span, how many methods touched it
      (0/1/2/3). 3/3 = consensus (the book's important bits); 1/3 = a method's
      idiosyncratic pick; 0 = used by nobody (missed, or noise). Directly answers
      "same passage, multiple methods both used it — how did each consume it into
      its methodology." Method-AGNOSTIC and cheapest: only needs the Layer-2
      anchors already committed as the project MVP.

    LENS 2 — Product-anchored side-by-side (pivot on product node).
      The spec's ≤3-panel synced view, each product in its NATIVE structure. Do
      NOT force row-alignment; instead hover a chunk in panel A → cosine-highlight
      semantically-near chunks in B and C (red/yellow). Alignment is
      content-driven, not positional. This is the spec's side-by-side + similarity
      highlight features.

    LENS 3 — Claim-normalized grid (pivot on claim node).
      Normalize all three products into a shared set of atomic claims (embedding +
      clustering — same cosine machinery as Lens 2). Render a matrix: rows = union
      of claims, columns = the 3 methods, cells = does/how this method expresses
      the claim. Reveals agreement (full row), unique contribution (single column),
      and conflict (all express it but phrasings disagree). This is the real,
      scalable way to "compare the distillates directly" — via a claim layer, not
      raw files.

constraints:
  - "Products are heterogeneous — never align by position; align on source spans (Lens 1) or on claims (Lens 3)."
  - "Build the tripartite graph ONCE; the three lenses are projections of the same graph, not three separate features."
  - "MVP = Lens 1 (source-anchored + coverage heatmap): method-agnostic, depends only on the already-committed Layer-2 anchors."
  - "Lens 3 depends on the cosine/similarity machinery (spec feature #2); its claim-layer design must be validated against REAL sample outputs (book2skill + 女娲) before build."
  - "Lens 1 and Lens 2 can proceed in parallel; Lens 3 is second."

